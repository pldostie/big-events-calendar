name: Update Big Events Calendar

on:
  schedule:
    # Runs every day at 05:00 UTC (1 AM ET / midnight CT)
    # This ensures tomorrow's matches (NHL, NFL, etc.) are always in the calendar
    - cron: "0 5 * * *"
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated calendar
        run: |
          git config user.name  "Big Events Bot"
          git config user.email "bot@users.noreply.github.com"
          git add big_events.ics
          # Only commit if the file actually changed
          git diff --cached --quiet \
            && echo "No changes today." \
            || git commit -m "Update big_events.ics $(date -u +'%Y-%m-%d')"

      - name: Push
        run: git push
